      - description: 'Itens por página (padrão: 25)'
        in: query
        name: size
        type: integer
      - description: Termo de busca
        in: query
        name: searchWord
        type: string
      - description: 'Campos para busca (ex: name)'
        in: query
        name: searchFields
        type: string
      - description: Campo para ordenação
        in: query
        name: orderBy
        type: string
      - description: Direção da ordenação (asc/desc)
        in: query
        name: orderDirection
        type: string
      produces:
      - application/json
      responses:
