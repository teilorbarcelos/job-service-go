host: localhost:8888
info:
  contact:
    email: suporte@swagger.io
    name: Suporte API
    url: http://www.swagger.io/support
  description: API modular em Go com Gin e Swagger.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Backend Go API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica o usuário com email e senha, retornando tokens JWT e
        dados do usuário.
      parameters:
      - description: Credenciais de acesso
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_app_auth.LoginResponse'
        "400":
          description: Dados inválidos
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Credenciais inválidas
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Realizar Login
      tags:
      - Auth
  /auth/me:
    get:
      description: Retorna informações do usuário logado baseado no token JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_app_auth.LoginResponse'
        "401":
          description: Não autorizado
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Obter dados do usuário atual
      tags:
      - Auth
  /auth/password/change:
    post:
      consumes:
      - application/json
      description: Altera a senha do usuário utilizando o código de validação.
      parameters:
      - description: Novos dados de senha
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: senha alterada com sucesso'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Token inválido ou expirado
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Redefinir senha
      tags:
      - Auth
  /auth/password/request:
    post:
      consumes:
      - application/json
      description: Envia um e-mail com um código de 6 dígitos para o usuário.
      parameters:
      - description: Email do usuário
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: e-mail de recuperação enviado se o usuário existir'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Solicitar recuperação de senha
      tags:
      - Auth
  /auth/password/validate:
    post:
      consumes:
      - application/json
      description: Verifica se o código de 6 dígitos é válido e não expirou.
      parameters:
      - description: Dados de validação
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_auth.ValidateTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'valid: true'
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Token inválido ou expirado
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Validar código de recuperação
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Gera um novo access token a partir de um refresh token válido.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_app_auth.LoginResponse'
        "400":
          description: Dados inválidos
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Refresh token inválido ou expirado
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Renovar token
      tags:
      - Auth
  /product:
    get:
      description: Retorna produtos com paginação e filtros.
      parameters:
      - description: 'Número da página (padrão: 1)'
        in: query
        name: page
        type: integer
      - description: 'Itens por página (padrão: 25)'
        in: query
        name: size
        type: integer
      - description: Termo de busca
        in: query
        name: searchWord
        type: string
      - description: 'Campos para busca (ex: name,sku,category)'
        in: query
        name: searchFields
        type: string
      - description: Campo para ordenação
        in: query
        name: orderBy
        type: string
      - description: Direção da ordenação (asc/desc)
        in: query
        name: orderDirection
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_app_product.ProductListResponse'
      security:
      - Bearer: []
      summary: Listar Produtos
      tags:
      - Product
    post:
      consumes:
      - application/json
      description: Cria um novo produto com os dados fornecidos.
      parameters:
      - description: Dados do produto
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_product.CreateProductDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/backend-go_internal_core_models.Product'
        "400":
          description: Dados inválidos
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Erro interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Criar Produto
      tags:
      - Product
  /product/{id}:
    delete:
      description: Remove um produto logicamente ou fisicamente baseado no ID.
      parameters:
      - description: ID do Produto
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'message: produto excluído com sucesso'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Erro interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Excluir Produto
      tags:
      - Product
    get:
      description: Retorna os detalhes de um produto específico.
      parameters:
      - description: ID do Produto
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-go_internal_core_models.Product'
        "404":
          description: Produto não encontrado
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Obter Produto
      tags:
      - Product
    put:
      consumes:
      - application/json
      description: Atualiza parcialmente um produto baseado no ID.
      parameters:
      - description: ID do Produto
        in: path
        name: id
        required: true
        type: string
      - description: Campos a serem atualizados
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-go_internal_core_models.Product'
        "400":
          description: Dados inválidos
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Erro interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Atualizar Produto
      tags:
      - Product
  /product/{id}/status:
    patch:
      consumes:
      - application/json
      description: Define se um produto está ativo ou inativo.
      parameters:
      - description: ID do Produto
        in: path
        name: id
        required: true
        type: string
      - description: Novo status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_app_product.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: status atualizado com sucesso'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Erro interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Alterar Status do Produto
      tags:
      - Product
  /product/all:
    get:
      description: Retorna todos os produtos (usado para selects/lookups).
      parameters:
      - description: Termo de busca
        in: query
        name: searchWord
        type: string
      - description: Campos para busca
        in: query
        name: searchFields
        type: string
      - description: Campo para ordenação
        in: query
        name: orderBy
        type: string
      - description: Direção da ordenação
        in: query
        name: orderDirection
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_app_product.ProductListAllResponse'
      security:
      - Bearer: []
      summary: Listar Todos os Produtos
      tags:
      - Product
  /role:
    get:
      description: Retorna papéis com paginação e filtros.
      parameters:
      - description: 'Número da página (padrão: 1)'
