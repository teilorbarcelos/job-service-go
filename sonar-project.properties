sonar.projectKey=job-service-go
sonar.projectName=Job Service Go
sonar.sources=cmd,internal
sonar.tests=internal
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/*_test.go,**/vendor/**,**/.git/**
sonar.coverage.exclusions=**/cmd/**/main.go
sonar.go.coverage.reportPaths=coverage.out
sonar.host.url=http://localhost:9000
# sonar.login is set via CI environment variable SONAR_TOKEN

# Ignore hardcoded dev defaults in env config (fallback URLs/creds)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S6736
sonar.issue.ignore.multicriteria.e1.resourceKey=**/internal/shared/config/env.go
sonar.issue.ignore.multicriteria.e2.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e2.resourceKey=**/internal/shared/config/env.go
