name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
          POSTGRES_DB: backend_go
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint (go vet)
        run: go vet ./...

      - name: Build
        run: GOTOOLCHAIN=go1.25.0 go build ./...

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgres://postgres:postgrespw@localhost:5432/backend_go?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          MESSAGING_ENABLED: "false"
        run: |
          GOTOOLCHAIN=go1.25.0 go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage gate (≥85% line)
        run: |
          python3 - <<'PY'
          import re
          with open("coverage.out") as f:
            data = f.read()
          total_covered = total_lines = 0
          for line in data.splitlines():
            m = re.match(r"^[^:]+:.*?(\d+)\s+(\d+)$", line)
            if m:
              stmts, hit = int(m.group(1)), int(m.group(2))
              total_lines += stmts
              total_covered += hit
          if total_lines == 0:
            raise SystemExit("No coverage data found")
          rate = total_covered / total_lines
          if rate < 0.85:
            raise SystemExit(f"Coverage below 85% — {rate*100:.1f}%")
          print(f"✅ Coverage gate passed: {rate*100:.1f}%")
          PY
