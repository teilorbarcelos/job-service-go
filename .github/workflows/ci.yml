name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
          POSTGRES_DB: backend_go
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint (go vet)
        run: go vet ./...

      - name: Build
        run: GOTOOLCHAIN=go1.25.0 go build ./...

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgres://postgres:postgrespw@localhost:5432/backend_go?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          MESSAGING_ENABLED: "false"
        run: |
          # -coverpkg restricts coverage to internal packages (excludes
          # the cmd/jobservice entry point which can't be unit-tested).
          GOTOOLCHAIN=go1.25.0 go test ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/...

      - name: Check coverage gate (≥85% line, excluding cmd/jobservice)
        run: |
          GOTOOLCHAIN=go1.25.0 go test ./... -coverprofile=coverage.out -covermode=atomic 2>&1 | tee /tmp/test.out > /dev/null
          # Compute weighted average across packages, excluding cmd/jobservice
          python3 - <<'PY'
          import re
          total_s, total_h = 0, 0
          with open("coverage.out") as f:
            data = f.read()
          # Build per-file stmts/hit
          files = {}
          for line in data.splitlines():
            if line.startswith("mode:"): continue
            m = re.match(r"^([^:]+):\s*[\d.,]+\s+(\d+)\s+(\d+)\s*$", line)
            if m:
              path, stmts, hit = m.group(1), int(m.group(2)), int(m.group(3))
              if "cmd/" in path: continue
              files[path] = files.get(path, [0, 0])
              files[path][0] += stmts
              files[path][1] += hit
          for path, (s, h) in files.items():
            total_s += s
            total_h += h
          if total_s == 0:
            raise SystemExit("No coverage data found")
          rate = total_h / total_s
          if rate < 0.85:
            raise SystemExit(f"Coverage below 85% — {rate*100:.1f}%")
          print(f"✅ Coverage gate passed: {rate*100:.1f}% ({total_h}/{total_s})")
          PY
